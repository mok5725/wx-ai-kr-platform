<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 WX해커톤 안내문 다운로드</title>
  <style>
    :root { --bg:#0A1A2A; --card:#16263a; --line:#24405c; --accent:#00A5E5; --muted:#7d96ad; --text:#eef4fa; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
           background:radial-gradient(1200px 600px at 50% -10%, #143049, var(--bg)); color:var(--text);
           display:flex; flex-direction:column; align-items:center; padding:40px 20px 64px; }
    h1 { font-size:1.9rem; font-weight:800; letter-spacing:-0.02em; margin:0 0 8px; text-align:center; }
    p.lead { color:var(--muted); margin:0 0 28px; font-size:1rem; text-align:center; }
    .btn { display:inline-flex; align-items:center; gap:10px; background:var(--accent); color:#04121e;
           font-size:1.15rem; font-weight:800; text-decoration:none; padding:16px 32px; border-radius:14px;
           box-shadow:0 10px 30px rgba(0,165,229,.35); transition:transform .15s, box-shadow .15s; }
    .btn:hover { transform:translateY(-2px); box-shadow:0 14px 38px rgba(0,165,229,.5); }
    .hint { color:var(--muted); font-size:.85rem; margin:14px 0 32px; text-align:center; line-height:1.6; }
    .preview { width:100%; max-width:740px; background:var(--card); border:1px solid var(--line);
               border-radius:16px; padding:12px; }
    .preview img { display:block; width:100%; height:auto; border-radius:8px; }
    footer { margin-top:40px; color:var(--muted); font-size:.8rem; }
  </style>
</head>
<body>
  <h1>2026 WX해커톤 안내문</h1>
  <p class="lead">End to End: Idea to Impact</p>

  <a class="btn" href="2026_wxhackathon_inform.png" download="2026_WX해커톤_안내문.png">
    ⬇ 안내문 다운로드 (PNG · 4.4MB)
  </a>
  <p class="hint">
    버튼을 누르면 이미지 파일이 저장됩니다.<br />
    휴대폰에서는 아래 이미지를 길게 눌러 &ldquo;이미지 저장&rdquo;을 선택하세요.
  </p>

  <div class="preview">
    <img src="2026_wxhackathon_inform.png" alt="2026 WX해커톤 안내문" />
  </div>

  <footer>© WX · wx.ai.kr</footer>
</body>
</html>
